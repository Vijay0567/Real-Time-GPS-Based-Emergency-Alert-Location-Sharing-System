{% extends 'base.html' %}

{% block content %}

<h2>Accident Map Dashboard</h2>

<div id="map"></div>

<script>

let map = L.map('map').setView([20,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

{% for alert in alerts %}

L.marker([{{alert.latitude}},{{alert.longitude}}])
.addTo(map)
.bindPopup("Accident Location");

{% endfor %}

</script>

{% endblock %}

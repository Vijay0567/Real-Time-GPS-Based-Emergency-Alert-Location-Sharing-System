<!DOCTYPE html>
<html>
<head>
    <title>Accident Map Dashboard</title>

    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        #map {
            height: 90vh;
            width: 100%; 
        }
    </style>
</head>
<body>

<h2>🚨 Live Accident Map Dashboard</h2>

<div id="map"></div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([20.5937, 78.9629], 5); // Default India center

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    {% for accident in accidents %}
        L.marker([{{ accident.latitude }}, {{ accident.longitude }}])
            .addTo(map)
            .bindPopup(
                "<b>Accident Detected</b><br>" +
                "Latitude: {{ accident.latitude }}<br>" +
                "Longitude: {{ accident.longitude }}<br>" +
                "Time: {{ accident.timestamp }}"
            );
    {% endfor %}
</script>

</body>
</html>

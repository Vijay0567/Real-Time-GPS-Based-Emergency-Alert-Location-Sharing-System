{% extends 'base.html' %}

{% block content %}

<h2>Emergency Contacts</h2>

<table class="table table-striped">

<tr>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
</tr>

{% for contact in contacts %}

<tr>
<td>{{ contact.name }}</td>
<td>{{ contact.phone_number }}</td>
<td>{{ contact.email }}</td>
</tr>

{% endfor %}

</table>

{% endblock %}

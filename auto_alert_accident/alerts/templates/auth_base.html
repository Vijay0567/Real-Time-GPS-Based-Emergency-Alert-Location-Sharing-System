<!DOCTYPE html>
<html>
<head>

<title>Auto Alert System</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>

body{
height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI, sans-serif;
margin:0;
}

.auth-container{
width:420px;
background:white;
border-radius:12px;
padding:35px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:fadeIn 0.8s ease;
}

.auth-title{
text-align:center;
margin-bottom:25px;
font-weight:600;
color:#333;
}

.form-control{
border-radius:8px;
padding:12px;
}

.auth-btn{
background:#2563eb;
border:none;
border-radius:8px;
padding:12px;
font-weight:500;
transition:0.3s;
color:white;
}

.auth-btn:hover{
background:#1e40af;
transform:scale(1.03);
}

.auth-link{
text-align:center;
margin-top:15px;
}

.logo{
text-align:center;
font-size:28px;
color:#2563eb;
margin-bottom:10px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="auth-container">

{% block content %}
{% endblock %}

</div>

<script>

document.querySelectorAll("input, select").forEach(input=>{
input.addEventListener("focus",()=>{
input.style.boxShadow="0 0 6px rgba(37,99,235,0.5)";
});
input.addEventListener("blur",()=>{
input.style.boxShadow="none";
});
});

</script>

</body>
</html>
